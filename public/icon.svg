<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background: dark warm brown, rounded corners match iOS/Android standard -->
  <rect width="512" height="512" rx="80" fill="#2A1A0E"/>

  <!-- House roof: solid terracotta fill, bold and sharp -->
  <polygon points="256,72 448,252 64,252" fill="#C05A3B"/>

  <!-- House walls: same terracotta, flush against roof base -->
  <rect x="88" y="240" width="336" height="200" fill="#C05A3B"/>

  <!-- Door: cream arch, centered, high contrast -->
  <path d="M214,440 L214,344 Q214,304 256,304 Q298,304 298,344 L298,440 Z" fill="#FAF5EE"/>

  <!-- Left window: cream, bold, clean rectangle -->
  <rect x="108" y="270" width="76" height="58" rx="10" fill="#FAF5EE"/>

  <!-- Right window: cream, bold, clean rectangle -->
  <rect x="328" y="270" width="76" height="58" rx="10" fill="#FAF5EE"/>
</svg>
